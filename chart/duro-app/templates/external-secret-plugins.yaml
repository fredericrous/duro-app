{{- if .Values.pluginSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "duro-app.fullname" . }}-plugin-secrets
  labels:
    {{- include "duro-app.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.pluginSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.pluginSecrets.secretStoreRef.name }}
    kind: {{ .Values.pluginSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "duro-app.fullname" . }}-plugin-secrets
    creationPolicy: Owner
  data:
    {{- range $envVar, $source := .Values.pluginSecrets.secrets }}
    - secretKey: {{ $envVar }}
      remoteRef:
        key: {{ $source.key }}
        property: {{ $source.property }}
    {{- end }}
{{- end }}
