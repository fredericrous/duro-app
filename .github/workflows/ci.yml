name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: duro-app
    permissions:
      contents: read
      packages: read

    # No `services: postgres:` — the dind-less self-hosted runner has no
    # docker socket, and the test suite already runs against PGlite via
    # makeTestDbLayer in app/lib/db/client.server.ts. PgClientLive (which
    # would consume DATABASE_URL) is not built by any test layer.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # `npm run build` can compile green while react-router-serve (SSR) still
      # dies at boot (bad server bundle, missing runtime export, etc.). This
      # boots the production bundle and curls /health, which is dependency-free
      # (returns {"status":"ok"} with no DB), so no Postgres is needed.
      - name: Smoke — server boots & serves
        run: |
          npm run start & SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3000/health && break
            sleep 1
          done
          curl -fsS http://localhost:3000/health \
            || { echo "::error::server did not serve /health within 30s"; kill $SERVER_PID; exit 1; }
          kill $SERVER_PID

      - name: Type check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run tests (with coverage gate)
        # `test:coverage` runs the suite with vitest's coverage thresholds
        # configured in vitest.config.ts. CI fails if any threshold is
        # breached, locking in the current floor (lines: 45%) and forcing
        # future PRs to maintain or raise it.
        run: npm run test:coverage
