name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/duro-app

# Force bash (homelab-runner /bin/sh is dash; buildah/stable is fine either way).
defaults:
  run:
    shell: bash

jobs:
  ci:
    name: Build & Test
    runs-on: duro-app
    permissions:
      contents: read
      packages: read
    # No `services: postgres:` — the dind-less self-hosted runner has no docker
    # socket, and the test suite runs against PGlite via makeTestDbLayer.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  build:
    name: Build & push image
    needs: ci
    runs-on: duro-app-ci
    permissions:
      contents: read
      packages: write
    container:
      image: quay.io/buildah/stable
    outputs:
      version_img: ${{ steps.ver.outputs.version_img }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version_img=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Buildah build + push (version, major.minor)
        env:
          REG_USER: ${{ github.actor }}
          REG_PASS: ${{ secrets.GITHUB_TOKEN }}
          # read:packages auth for private @fredericrous/* deps during npm ci.
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.version_img }}
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          MM=$(echo "$V" | awk -F. '{print $1"."$2}')
          printf '%s' "$NPM_TOKEN" > /tmp/npm_token
          buildah bud --storage-driver=vfs \
            --secret id=npm_token,src=/tmp/npm_token \
            -t "$IMG:$V" -t "$IMG:$MM" .
          buildah login -u "$REG_USER" -p "$REG_PASS" ghcr.io
          for t in "$V" "$MM"; do
            buildah push --storage-driver=vfs "$IMG:$t"
          done

  release:
    name: Release
    needs: build
    runs-on: duro-app
    permissions:
      contents: write
      packages: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_IMG=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_IMG=$VERSION_IMG" >> $GITHUB_OUTPUT

          PREV_TAG=$(git describe --tags --abbrev=0 $VERSION^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" $PREV_TAG..$VERSION)
          else
            COMMITS=$(git log --pretty=format:"- %s")
          fi

          cat > release-notes.md << NOTES
          ## duro-app $VERSION

          ### Docker Image
          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION_IMG
          \`\`\`

          ### Installation
          \`\`\`bash
          helm repo add fredericrous https://fredericrous.github.io/charts
          helm repo update
          helm install duro fredericrous/duro-app
          \`\`\`

          ### What's Changed
          $COMMITS

          ### Full Changelog
          ${PREV_TAG:+https://github.com/${{ github.repository }}/compare/$PREV_TAG...$VERSION}
          NOTES

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true

      - name: Bump Chart.yaml in source repo
        run: |
          VERSION="${{ steps.release_notes.outputs.VERSION_IMG }}"
          CHART_PATH="chart/duro-app/Chart.yaml"
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git checkout -B main origin/main

            CURRENT=$(grep '^version:' "$CHART_PATH" | awk '{print $2}')
            if [ "$CURRENT" = "$VERSION" ]; then
              echo "Chart.yaml already at $VERSION on main, nothing to do"
              exit 0
            fi

            sed -i "s/^version: .*/version: $VERSION/" "$CHART_PATH"
            sed -i "s/^appVersion: .*/appVersion: $VERSION/" "$CHART_PATH"
            git add "$CHART_PATH"
            git commit -m "chore: bump chart to $VERSION [skip ci]"

            if git push origin main; then
              echo "Pushed chart bump on attempt $attempt"
              exit 0
            fi

            echo "Push rejected on attempt $attempt — main moved. Re-fetching and retrying..."
            sleep $((RANDOM % 5 + 1))
          done

          echo "::error::Could not push chart bump after 5 attempts — main is heavily contended"
          exit 1

      - name: Trigger Helm Chart Update
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.release_notes.outputs.VERSION_IMG }}"
          echo "Triggering Helm chart update for version ${VERSION}..."
          gh workflow run update-helm-chart.yaml \
            --field version="${VERSION}"
          echo "Successfully triggered Helm chart update for version ${VERSION}"

  security-scan:
    name: Security Scan
    needs: release
    runs-on: duro-app
    permissions:
      security-events: write
    steps:
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
